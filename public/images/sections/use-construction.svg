<svg viewBox="0 0 720 405" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Structural framing plan with grid lines, columns, dimensions, and a review markup">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#070B16"/>
    </linearGradient>
    <pattern id="cgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#4EBABD" stroke-width="0.5" stroke-opacity="0.10"/>
    </pattern>
    <marker id="carrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1 1L5 4L1 7" fill="none" stroke="#6FCFD1" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="720" height="405" fill="url(#cbg)"/>
  <rect width="720" height="405" fill="url(#cgrid)"/>

  <!-- column grid bubbles -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#6FCFD1">
    <g stroke="#2FA3A6" stroke-width="1" fill="none">
      <circle cx="150" cy="70" r="13"/><circle cx="360" cy="70" r="13"/><circle cx="570" cy="70" r="13"/>
      <circle cx="92" cy="150" r="13"/><circle cx="92" cy="300" r="13"/>
    </g>
    <text x="150" y="74" text-anchor="middle">A</text>
    <text x="360" y="74" text-anchor="middle">B</text>
    <text x="570" y="74" text-anchor="middle">C</text>
    <text x="92" y="154" text-anchor="middle">1</text>
    <text x="92" y="304" text-anchor="middle">2</text>
  </g>

  <!-- grid axes -->
  <g stroke="#4EBABD" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="2 4">
    <line x1="150" y1="84" x2="150" y2="360"/>
    <line x1="360" y1="84" x2="360" y2="360"/>
    <line x1="570" y1="84" x2="570" y2="360"/>
    <line x1="106" y1="150" x2="620" y2="150"/>
    <line x1="106" y1="300" x2="620" y2="300"/>
  </g>

  <!-- slab outline -->
  <rect x="150" y="150" width="420" height="150" fill="#4EBABD" fill-opacity="0.05" stroke="#4EBABD" stroke-width="1.5"/>
  <!-- beams -->
  <g stroke="#6FCFD1" stroke-width="2">
    <line x1="150" y1="150" x2="570" y2="150"/>
    <line x1="150" y1="300" x2="570" y2="300"/>
    <line x1="360" y1="150" x2="360" y2="300"/>
  </g>
  <!-- secondary joists -->
  <g stroke="#4EBABD" stroke-width="1" stroke-opacity="0.5">
    <line x1="210" y1="150" x2="210" y2="300"/><line x1="270" y1="150" x2="270" y2="300"/>
    <line x1="420" y1="150" x2="420" y2="300"/><line x1="480" y1="150" x2="480" y2="300"/>
  </g>
  <!-- columns -->
  <g fill="#070B16" stroke="#6FCFD1" stroke-width="1.5">
    <rect x="144" y="144" width="12" height="12"/><rect x="354" y="144" width="12" height="12"/><rect x="564" y="144" width="12" height="12"/>
    <rect x="144" y="294" width="12" height="12"/><rect x="354" y="294" width="12" height="12"/><rect x="564" y="294" width="12" height="12"/>
  </g>

  <!-- dimension line -->
  <g stroke="#6FCFD1" stroke-width="1">
    <line x1="150" y1="340" x2="360" y2="340" marker-start="url(#carrow)" marker-end="url(#carrow)"/>
    <line x1="360" y1="340" x2="570" y2="340" marker-start="url(#carrow)" marker-end="url(#carrow)"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#8A94A6" text-anchor="middle">
    <text x="255" y="356">7 200</text>
    <text x="465" y="356">7 200</text>
  </g>

  <!-- review markup cloud -->
  <path d="M250 195q-10-12 4-14q-2-12 12-9q4-10 16-2q12-6 14 8q12 0 7 13q8 8-4 14q2 12-12 9q-6 9-16 2q-12 5-14-8q-12 1-7-13z"
        fill="none" stroke="#FF6B4A" stroke-width="1.5"/>
  <circle cx="296" cy="186" r="9" fill="#FF6B4A"/>
  <text x="296" y="190" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#fff">2</text>

  <!-- title-block tag -->
  <g>
    <rect x="486" y="330" width="200" height="48" rx="3" fill="#0B1120" stroke="#1E2A42"/>
    <text x="498" y="350" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.5" fill="#5E6A80">S-201 · FRAMING PLAN</text>
    <text x="498" y="366" font-family="'SF Pro Display', sans-serif" font-size="11" fill="#ECEFF4">Level 2 — Rev C</text>
    <circle cx="672" cy="354" r="8" fill="none" stroke="#4EBABD" stroke-width="1.2"/>
    <path d="M668 354l3 3 5-6" fill="none" stroke="#4EBABD" stroke-width="1.4"/>
  </g>
</svg>
