  <rect x="468" y="342" width="24" height="26" rx="3" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="480" y="359" fill="#ef4444" font-size="8.5" text-anchor="middle" font-weight="700">PDF</text>
  <text x="502" y="349" fill="#E8EEF7" font-size="10" font-weight="500">PDF with markups</text>
  <text x="502" y="362" fill="#5E6A80" font-size="8.5">Flatten markups and takeoff into a downloadable PDF</text>
  <text x="828" y="356" fill="#5E6A80" font-size="10">↓</text>

