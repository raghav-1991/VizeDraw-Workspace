  <text x="490" y="447" fill="#E8EEF7" font-size="10" font-weight="500">XFDF for import</text>
  <text x="490" y="459" fill="#5E6A80" font-size="8.5">Import via Markups List after opening the same drawing PDF</text>
  <text x="828" y="452" fill="#5E6A80" font-size="10">↓</text>

