  <circle cx="32" cy="21" r="4.5" fill="#FFB23E" fill-opacity="0.85"/>
  <circle cx="46" cy="21" r="4.5" fill="#4ebabd" fill-opacity="0.85"/>
  <text x="72" y="25" fill="#E8EEF7" font-size="11" font-weight="500">13. 60_Flex (MI) 2025-11-21.pdf</text>
