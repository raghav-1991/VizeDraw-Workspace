  <rect x="468" y="392" width="24" height="26" rx="3" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.35"/>
  <text x="480" y="409" fill="#ef4444" font-size="7.5" text-anchor="middle" font-weight="700">PDF</text>
  <text x="502" y="399" fill="#E8EEF7" font-size="10" font-weight="500">PDF for Editable</text>
  <text x="502" y="412" fill="#5E6A80" font-size="8.5">Standard PDF annotations — editable in Revu Markups List</text>
  <text x="828" y="406" fill="#5E6A80" font-size="10">↓</text>

