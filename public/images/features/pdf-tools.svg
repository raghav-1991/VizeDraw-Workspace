<svg width="900" height="506" viewBox="0 0 900 506" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VizeDraw PDF tools export panel with flatten, headers, and output format options" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif">
  <defs>
    <pattern id="pg" width="28" height="28" patternUnits="userSpaceOnUse">
