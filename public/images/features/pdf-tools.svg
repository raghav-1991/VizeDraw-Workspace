  <text x="496" y="276" fill="#5E6A80" font-size="8.5">Place the same stamp on multiple pages</text>
  <text x="828" y="268" fill="#5E6A80" font-size="10">↓</text>

  <!-- Output section -->
  <text x="458" y="322" fill="#8A94A6" font-size="11" font-weight="600">Output</text>

  <!-- PDF with markups -->
