<svg width="900" height="506" viewBox="0 0 900 506" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VizeDraw enterprise access control with Owner, Editor, and Viewer roles" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif">
